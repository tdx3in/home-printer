<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="#25c2a0" rx="20"/>
  <g fill="white" stroke="white" stroke-width="2">
    <!-- Printer body -->
    <rect x="20" y="30" width="60" height="50" rx="5" fill="none"/>
    <!-- Paper slot -->
    <rect x="25" y="35" width="50" height="8" fill="none"/>
    <!-- Paper output -->
    <line x1="25" y1="45" x2="75" y2="45"/>
    <line x1="25" y1="50" x2="75" y2="50"/>
    <!-- Control panel -->
    <circle cx="35" cy="70" r="3" fill="white"/>
    <circle cx="50" cy="70" r="3" fill="white"/>
    <circle cx="65" cy="70" r="3" fill="white"/>
  </g>
</svg>
